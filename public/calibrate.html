<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Map Calibration Tool | St. Mary's University</title>
<meta name="robots" content="noindex, follow"/>
<link rel="canonical" href="https://smru.edu.in/calibrate.html"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .seo-heading { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  body { background: #111; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 280px; flex-shrink: 0; background: #1a1a2e; overflow-y: auto; padding: 10px; border-right: 1px solid #333; }
  #sidebar h2 { font-size: 13px; color: #019e6e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .point-item { padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .point-item:hover { background: #252545; }
  .point-item.active { background: #019e6e22; border-color: #019e6e; }
  .point-num { background: #019e6e; color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
  .point-coords { color: #888; font-size: 10px; margin-left: 24px; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #toolbar { background: #1a1a2e; padding: 8px 12px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
  #toolbar button { background: #019e6e; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  #toolbar button:hover { background: #017a55; }
  #toolbar button.danger { background: #c0392b; }
  #status { font-size: 11px; color: #aaa; margin-left: auto; }
  #mapwrap { flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
  #mapbox { position: relative; user-select: none; }
  #mapbox img { display: block; max-width: 100%; max-height: 100%; }
  .pin { position: absolute; transform: translate(-50%, -50%); cursor: grab; z-index: 10; }
  .pin:active { cursor: grabbing; z-index: 20; }
  .pin-dot { width: 26px; height: 26px; border-radius: 50%; border: 3px solid white; background: #888; display: flex; align-items: center; justify-content: center; color: white; font-size: 9px; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.7); transition: transform 0.1s; }
  .pin:hover .pin-dot { transform: scale(1.2); }
  .pin.active .pin-dot { background: #019e6e; border-color: #fff; transform: scale(1.3); box-shadow: 0 0 0 4px rgba(1,158,110,0.4); }
  .pin-label { position: absolute; left: 50%; transform: translateX(-50%); top: -20px; background: rgba(0,0,0,0.85); color: white; font-size: 9px; white-space: nowrap; padding: 2px 5px; border-radius: 3px; pointer-events: none; display: none; }
  .pin:hover .pin-label, .pin.active .pin-label { display: block; }
  #output { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1a1a2e; border: 1px solid #019e6e; border-radius: 10px; padding: 20px; z-index: 100; width: 80vw; max-height: 80vh; overflow-y: auto; }
  #output textarea { width: 100%; height: 300px; background: #111; color: #0f0; border: 1px solid #333; padding: 8px; font-size: 11px; }
  #output .close { background: #c0392b; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; margin-top: 8px; }
  #output .copy { background: #019e6e; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; margin-top: 8px; margin-right: 8px; }
</style>
</head>
<body>
<h1 class="seo-heading">Map Calibration Tool</h1>
<div id="sidebar">
  <h2>📍 Points</h2>
  <div id="point-list"></div>
</div>
<div id="main">
  <div id="toolbar">
    <strong style="font-size:12px;color:#019e6e;">Stmarys University Map Calibrator</strong>
    <button onclick="showOutput()">💾 Export JSON</button>
    <button onclick="resetAll()" class="danger">↺ Reset</button>
    <span id="status">Drag pins to correct positions</span>
  </div>
  <div id="mapwrap">
    <div id="mapbox">
      <img id="mapimg" src="/campus-guide/images/campus-satellite.webp" alt="Campus Map" draggable="false"/>
    </div>
  </div>
</div>
<div id="output">
  <h3 style="color:#019e6e;margin-bottom:10px;">Calibrated Coordinates (copy to guide.json)</h3>
  <textarea id="json-out" readonly></textarea>
  <br/>
  <button class="copy" onclick="copyOut()">📋 Copy</button>
  <button class="close" onclick="document.getElementById('output').style.display='none'">✕ Close</button>
</div>

<script>
let points = [];
let activeIdx = null;
let dragging = null;
let dragOffX = 0, dragOffY = 0;

async function init() {
  const res = await fetch('/campus-guide/data/guide.json');
  const data = await res.json();
  points = data.points.map(p => ({
    id: p.id,
    name: p.title.en,
    mapX: p.mapX,
    mapY: p.mapY
  }));
  renderSidebar();
  renderPins();
}

function renderSidebar() {
  const list = document.getElementById('point-list');
  list.innerHTML = '';
  points.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'point-item' + (activeIdx === i ? ' active' : '');
    div.innerHTML = `<span class="point-num">${i+1}</span><span>${p.name}</span>`;
    const coords = document.createElement('div');
    coords.className = 'point-coords';
    coords.id = `coords-${i}`;
    coords.textContent = `X:${p.mapX.toFixed(1)}% Y:${p.mapY.toFixed(1)}%`;
    div.appendChild(coords);
    div.onclick = () => { activeIdx = i; renderSidebar(); updatePins(); };
    list.appendChild(div);
  });
}

function renderPins() {
  const mapbox = document.getElementById('mapbox');
  // remove old pins
  mapbox.querySelectorAll('.pin').forEach(p => p.remove());
  points.forEach((p, i) => {
    const pin = document.createElement('div');
    pin.className = 'pin' + (activeIdx === i ? ' active' : '');
    pin.id = `pin-${i}`;
    pin.style.left = p.mapX + '%';
    pin.style.top = p.mapY + '%';
    pin.innerHTML = `<div class="pin-label">${p.name}</div><div class="pin-dot">${i+1}</div>`;
    pin.addEventListener('mousedown', e => startDrag(e, i));
    pin.addEventListener('touchstart', e => startDrag(e, i), {passive:false});
    pin.onclick = () => { activeIdx = i; renderSidebar(); updatePins(); };
    mapbox.appendChild(pin);
  });
}

function updatePins() {
  points.forEach((p, i) => {
    const pin = document.getElementById(`pin-${i}`);
    if (!pin) return;
    pin.className = 'pin' + (activeIdx === i ? ' active' : '');
    pin.style.left = p.mapX + '%';
    pin.style.top = p.mapY + '%';
    const coords = document.getElementById(`coords-${i}`);
    if (coords) coords.textContent = `X:${p.mapX.toFixed(1)}% Y:${p.mapY.toFixed(1)}%`;
  });
  const items = document.querySelectorAll('.point-item');
  items.forEach((el, i) => {
    el.className = 'point-item' + (activeIdx === i ? ' active' : '');
  });
  if (activeIdx !== null) {
    const item = document.querySelectorAll('.point-item')[activeIdx];
    item?.scrollIntoView({block:'nearest'});
  }
}

function startDrag(e, i) {
  e.preventDefault();
  e.stopPropagation();
  activeIdx = i;
  dragging = i;
  const mapbox = document.getElementById('mapbox');
  const rect = mapbox.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  dragOffX = clientX - rect.left - (points[i].mapX / 100) * rect.width;
  dragOffY = clientY - rect.top - (points[i].mapY / 100) * rect.height;
  updatePins();
}

document.addEventListener('mousemove', e => doDrag(e.clientX, e.clientY));
document.addEventListener('touchmove', e => { if (dragging !== null) { e.preventDefault(); doDrag(e.touches[0].clientX, e.touches[0].clientY); }}, {passive:false});

function doDrag(clientX, clientY) {
  if (dragging === null) return;
  const mapbox = document.getElementById('mapbox');
  const rect = mapbox.getBoundingClientRect();
  let x = ((clientX - dragOffX - rect.left) / rect.width) * 100;
  let y = ((clientY - dragOffY - rect.top) / rect.height) * 100;
  x = Math.max(0, Math.min(100, x));
  y = Math.max(0, Math.min(100, y));
  points[dragging].mapX = Math.round(x * 10) / 10;
  points[dragging].mapY = Math.round(y * 10) / 10;
  updatePins();
  document.getElementById('status').textContent = `${points[dragging].name}: X=${points[dragging].mapX}% Y=${points[dragging].mapY}%`;
}

document.addEventListener('mouseup', () => { dragging = null; });
document.addEventListener('touchend', () => { dragging = null; });

function showOutput() {
  const out = points.map(p => `  "${p.name}": { mapX: ${p.mapX}, mapY: ${p.mapY} }`).join(',\n');
  document.getElementById('json-out').value = `{\n${out}\n}`;
  document.getElementById('output').style.display = 'block';
}

function copyOut() {
  const ta = document.getElementById('json-out');
  ta.select();
  document.execCommand('copy');
  document.querySelector('#output .copy').textContent = '✓ Copied!';
  setTimeout(() => document.querySelector('#output .copy').textContent = '📋 Copy', 2000);
}

async function applyToGuide() {
  // Apply current positions back to guide.json via the dev server
  console.log('Calibrated positions:', JSON.stringify(points.map(p => ({id:p.id,mapX:p.mapX,mapY:p.mapY}))));
}

function resetAll() {
  init();
}

init();
</script>
</body>
</html>
