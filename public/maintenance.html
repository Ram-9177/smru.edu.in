<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Under Maintenance | St. Mary's University</title>
    <meta name="robots" content="noindex,follow" />
    <style>
      body { 
        margin:0; 
        font-family: 'Outfit', system-ui, -apple-system, sans-serif; 
        background:#f5f9ff; 
        color:#0d315c; 
        display:grid; 
        place-items:center; 
        min-height:100vh; 
        text-align:center;
      }
      .card { 
        background:#fff; 
        border:1px solid #e5e7eb; 
        border-radius:24px; 
        padding:48px 32px; 
        box-shadow:0 10px 30px rgba(13,49,92,.08); 
        max-width:560px; 
        width: 90%;
      }
      .logo {
        max-width: 120px;
        margin-bottom: 24px;
      }
      h1 { 
        margin: 0 0 16px; 
        font-size: 32px;
        font-weight: 800;
      }
      p { 
        font-size: 18px;
        line-height: 1.6;
        color: #4b5563;
        margin-bottom: 32px;
      }
      .status-dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        background: #019e6e;
        border-radius: 50%;
        margin-right: 8px;
        box-shadow: 0 0 0 4px rgba(1,158,110,0.1);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(1,158,110,0.4); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(1,158,110,0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(1,158,110,0); }
      }
      .footer {
        font-size: 14px;
        color: #9ca3af;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/favicon.png" alt="St. Mary's University Logo" class="logo">
      <h1>Site Update in Progress</h1>
      <p>We are currently upgrading the St. Mary's University website to serve you better. We'll be back online in a few minutes.</p>
      <div>
        <span class="status-dot"></span>
        <strong>Systems are updating...</strong>
      </div>
      <p class="footer">Thank you for your patience. &copy; St. Mary's University</p>
    </main>
  </body>
</html>
