name: SEO Hardening CI

on:
  push:
    branches:
      - main
      - seo-hardening-phase-1
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Build, lint, and SEO sanity checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify generated sitemap exists
        run: |
          test -f .next/server/app/sitemap.xml.body || test -f out/sitemap.xml || test -d .next

      - name: Verify SEO guard files exist
        run: |
          test -f src/lib/seo/authority-map.ts
          test -f src/lib/seo/course-list.ts
          test -f SEO_BACKLINK_CITATION_EXECUTION_SHEET.md
          test -f SEO_HARDENING_PHASE_1_STATUS.md
